# Grafana datasources configuration
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    version: 1
    editable: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: jaeger
      prometheusType: Prometheus
      prometheusVersion: 2.40.0
      cacheLevel: High
      timeInterval: 30s
      incrementalQuerying: true
    secureJsonFields: {}

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: pii_system
    user: pii_user
    secureJsonData:
      password: pii_secure_password
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
    version: 1
    readOnly: false