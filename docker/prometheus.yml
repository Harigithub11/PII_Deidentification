# Prometheus configuration for PII De-identification System
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'pii-system-monitor'

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PII API metrics
  - job_name: 'pii-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/api/v1/system/metrics/prometheus'
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true

  # System-level metrics from API
  - job_name: 'pii-system-metrics'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/api/v1/system/metrics'
    scrape_interval: 60s
    scrape_timeout: 15s

  # PostgreSQL metrics (if postgres_exporter is added)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s
    scrape_timeout: 10s

  # Redis metrics (if redis_exporter is added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s
    scrape_timeout: 10s

  # Component monitoring metrics
  - job_name: 'pii-components'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/api/v1/components/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Airflow metrics (if available)
  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-webserver:8080']
    metrics_path: '/admin/metrics'
    scrape_interval: 60s
    scrape_timeout: 15s

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Storage configuration
storage:
  tsdb:
    retention.time: 7d
    retention.size: 1GB