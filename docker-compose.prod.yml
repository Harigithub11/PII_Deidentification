version: '3.8'

# Production Docker Compose Configuration
# Use with: docker-compose -f docker-compose.prod.yml up -d

services:
  # PostgreSQL Database with production settings
  postgres:
    image: postgres:15-alpine
    container_name: pii-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pii_system_prod}
      POSTGRES_USER: ${POSTGRES_USER:-pii_prod_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - ./backups:/backups:ro
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pii_prod_user} -d ${POSTGRES_DB:-pii_system_prod}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - pii-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # Redis with production configuration
  redis:
    image: redis:7-alpine
    container_name: pii-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./docker/redis-prod.conf:/usr/local/etc/redis/redis.conf:ro
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - pii-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # Main API Application - Production
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: pii-de-identification-api:latest
    container_name: pii-api-prod
    environment:
      # Application
      - APP_NAME=PII De-identification System
      - APP_VERSION=2.1.0
      - DEBUG=false
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pii_prod_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pii_system_prod}
      - DATABASE_POOL_SIZE=20
      
      # Redis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # Security
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      
      # Models
      - MODEL_CACHE_DIR=/app/models/cache
      - ENABLE_GPU=${ENABLE_GPU:-false}
      
      # CORS (production domains only)
      - CORS_ORIGINS=${CORS_ORIGINS:-["https://your-domain.com"]}
      
      # Monitoring
      - ENABLE_METRICS=true
      - COMPONENT_MONITORING_ENABLED=true
      - ALERT_NOTIFICATIONS_ENABLED=true
    volumes:
      - app_data:/app/data
      - app_models:/app/models
      - app_logs:/app/logs
      - ./config:/app/config:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pii-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # Load Balancer for API
  nginx:
    image: nginx:1.24-alpine
    container_name: pii-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pii-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Celery Workers - Production
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: pii-de-identification-api:latest
    command: celery -A src.core.batch.celery_config worker --loglevel=info --concurrency=4 --max-tasks-per-child=1000
    environment:
      - APP_NAME=PII De-identification System
      - DEBUG=false
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pii_prod_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pii_system_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MODEL_CACHE_DIR=/app/models/cache
      - ENABLE_GPU=${ENABLE_GPU:-false}
    volumes:
      - app_data:/app/data
      - app_models:/app/models
      - app_logs:/app/logs
      - ./config:/app/config:ro
    restart: always
    healthcheck:
      test: ["CMD", "celery", "-A", "src.core.batch.celery_config", "inspect", "ping"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pii-network
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 8G
          cpus: '4.0'

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: pii-de-identification-api:latest
    container_name: pii-celery-beat-prod
    command: celery -A src.core.batch.celery_config beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pii_prod_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pii_system_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    restart: always
    depends_on:
      - redis
      - postgres
    networks:
      - pii-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Airflow Production Setup
  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    entrypoint: /bin/bash
    command: >
      -c "
        airflow db init &&
        airflow users create --role Admin --username admin --email admin@company.com --firstname Admin --lastname User --password ${AIRFLOW_ADMIN_PASSWORD:-admin123}
      "
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://${POSTGRES_USER:-pii_prod_user}:${POSTGRES_PASSWORD}@postgres:5432/airflow_prod
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pii-network

  # Airflow Webserver - Production
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: pii-airflow-webserver-prod
    command: airflow webserver
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://${POSTGRES_USER:-pii_prod_user}:${POSTGRES_PASSWORD}@postgres:5432/airflow_prod
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=False
      - AIRFLOW__WEBSERVER__AUTHENTICATE=True
    volumes:
      - ./orchestration:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - pii-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # Airflow Scheduler - Production
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: pii-airflow-scheduler-prod
    command: airflow scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://${POSTGRES_USER:-pii_prod_user}:${POSTGRES_PASSWORD}@postgres:5432/airflow_prod
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
    volumes:
      - ./orchestration:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    restart: always
    healthcheck:
      test: ["CMD", "pgrep", "-f", "airflow scheduler"]
      interval: 60s
      timeout: 10s
      retries: 3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - pii-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # Prometheus for Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: pii-prometheus-prod
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: always
    networks:
      - pii-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # Grafana for Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: pii-grafana-prod
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-localhost}
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./docker/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    restart: always
    depends_on:
      - prometheus
    networks:
      - pii-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # Backup Service
  backup:
    image: postgres:15-alpine
    container_name: pii-backup-prod
    volumes:
      - ./backups:/backups
      - ./docker/backup-script.sh:/backup-script.sh:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-pii_prod_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-pii_system_prod}
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}
    command: |
      sh -c "
        apk add --no-cache dcron &&
        echo '${BACKUP_SCHEDULE:-0 2 * * *} /backup-script.sh' | crontab - &&
        crond -f
      "
    restart: always
    depends_on:
      - postgres
    networks:
      - pii-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_data:
    driver: local
  app_models:
    driver: local
  app_logs:
    driver: local
  airflow_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  pii-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16