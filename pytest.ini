[tool:pytest]
# Pytest Configuration for PII De-identification System
# Comprehensive test configuration with markers, coverage, and performance settings

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test execution
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing:skip-covered
    --cov-fail-under=85
    --durations=10
    --maxfail=5

# Test markers for categorization
markers =
    unit: Unit tests
    integration: Integration tests  
    api: API endpoint tests
    security: Security-related tests
    performance: Performance and load tests
    compliance: Compliance validation tests (GDPR, HIPAA, PCI-DSS)
    smoke: Smoke tests for quick validation
    slow: Tests that run slowly
    requires_models: Tests that require AI/ML models to be loaded
    requires_database: Tests that require database connection
    requires_redis: Tests that require Redis connection
    requires_external: Tests that require external services
    windows: Windows-specific tests
    linux: Linux-specific tests
    docker: Docker-related tests

# Test timeouts
timeout = 300
timeout_method = thread

# Filtering
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    error::pytest.PytestUnraisableExceptionWarning

# Test output
console_output_style = progress
junit_family = xunit2

# Coverage configuration
[coverage:run]
source = src
omit = 
    src/main.py
    src/__init__.py
    src/*/test*
    src/*/conftest.py
    */migrations/*
    */venv/*
    */virtualenv/*
    */.tox/*
    */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml