name: Continuous Integration

on:
  push:
    branches: [ master, main, develop, comprehensive-testing-suite ]
  pull_request:
    branches: [ master, main, develop ]

env:
  PYTHON_VERSION: '3.9'
  NODE_VERSION: '18'

jobs:
  # Code Quality and Security Checks
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality & Security
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better analysis
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt || echo "requirements-dev.txt not found"
        pip install bandit safety black flake8 mypy isort
    
    - name: Code formatting check (Black)
      run: |
        black --check --diff src/ tests/ || true
    
    - name: Import sorting check (isort)
      run: |
        isort --check-only --diff src/ tests/ || true
    
    - name: Lint with flake8
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
    
    - name: Type checking with mypy
      run: |
        mypy src/ --ignore-missing-imports --no-strict-optional || true
    
    - name: Security linting with bandit
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/ || true
    
    - name: Dependency security check
      run: |
        safety check --json --output safety-report.json || true
        safety check || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
        retention-days: 30

  # Unit and Integration Tests
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    name: Test (Python ${{ matrix.python-version }})
    
    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-${{ matrix.python-version }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.python-version }}-pip-
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-hin
        sudo apt-get install -y poppler-utils
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-mock
        pip install httpx
    
    - name: Download test models (lightweight)
      run: |
        python -c "
        import spacy
        try:
            spacy.cli.download('en_core_web_sm')
        except:
            print('Could not download spaCy model, will use mock in tests')
        "
    
    - name: Set up test environment
      run: |
        mkdir -p logs
        mkdir -p uploads
        mkdir -p temp
        export TEST_MODE=true
        export DATABASE_URL=postgresql://testuser:testpassword@localhost:5432/testdb
        export REDIS_URL=redis://localhost:6379/1
    
    - name: Run unit tests
      run: |
        export TEST_MODE=true
        export DATABASE_URL=sqlite:///test.db
        export REDIS_URL=redis://localhost:6379/1
        pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=80 -m "not slow and not requires_models"
    
    - name: Run integration tests
      run: |
        export TEST_MODE=true
        export DATABASE_URL=postgresql://testuser:testpassword@localhost:5432/testdb
        export REDIS_URL=redis://localhost:6379/1
        pytest tests/ -v --tb=short -m "integration and not slow"
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # API and Performance Tests
  api-tests:
    runs-on: ubuntu-latest
    name: API & Performance Tests
    
    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx locust
    
    - name: Start application
      run: |
        export TEST_MODE=true
        export REDIS_URL=redis://localhost:6379/1
        python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 &
        sleep 10
    
    - name: Health check
      run: |
        curl -f http://localhost:8000/health || exit 1
    
    - name: Run API tests
      run: |
        export TEST_MODE=true
        export API_BASE_URL=http://localhost:8000
        pytest tests/ -v -m "api" --tb=short
    
    - name: Run performance tests
      run: |
        locust -f tests/performance/locustfile.py --headless --users 10 --spawn-rate 2 --run-time 30s --host http://localhost:8000 || echo "Performance tests completed"

  # Security and Compliance Tests
  security-compliance:
    runs-on: ubuntu-latest
    name: Security & Compliance
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety semgrep
        npm install -g retire
    
    - name: Run Semgrep security scan
      run: |
        semgrep scan --config auto --json --output semgrep-results.json || true
        semgrep scan --config auto || true
    
    - name: Run dependency vulnerability scan
      run: |
        safety check --json --output safety-results.json || true
    
    - name: Check for hardcoded secrets
      run: |
        grep -r -n -E "(password|secret|key|token).*=" src/ || echo "No hardcoded secrets found"
        grep -r -n -E "(api[_-]?key|auth[_-]?token|secret[_-]?key)" src/ || echo "No API keys found"
    
    - name: Run compliance tests
      run: |
        export TEST_MODE=true
        pytest tests/ -v -m "compliance" --tb=short
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-results
        path: |
          semgrep-results.json
          safety-results.json
        retention-days: 30

  # Docker Build and Test
  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build & Test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t pii-deidentification:latest .
    
    - name: Test Docker image
      run: |
        docker run --rm -d --name test-container -p 8000:8000 pii-deidentification:latest
        sleep 15
        curl -f http://localhost:8000/health || exit 1
        docker stop test-container
    
    - name: Scan Docker image for vulnerabilities
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          -v $HOME/.cache:/root/.cache \
          aquasec/trivy:latest image --exit-code 0 --no-progress --format json --output trivy-results.json pii-deidentification:latest || true
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          -v $HOME/.cache:/root/.cache \
          aquasec/trivy:latest image --exit-code 0 --no-progress pii-deidentification:latest || echo "Vulnerability scan completed"
    
    - name: Upload Docker scan results
      uses: actions/upload-artifact@v3
      with:
        name: docker-scan-results
        path: trivy-results.json
        retention-days: 30

  # Documentation and Link Checking
  documentation:
    runs-on: ubuntu-latest
    name: Documentation Check
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check documentation links
      run: |
        sudo apt-get update
        sudo apt-get install -y linkchecker
        linkchecker --check-extern README.md || true
        linkchecker --check-extern ARCHITECTURE.md || true
    
    - name: Check for broken internal links
      run: |
        grep -r "\[.*\](.*\.md)" *.md docs/ || echo "No internal markdown links found"
        find . -name "*.md" -exec grep -l "](.*\.md)" {} \; || echo "No cross-references found"
    
    - name: Validate YAML files
      run: |
        python -c "
        import yaml
        import os
        for root, dirs, files in os.walk('.'):
            for file in files:
                if file.endswith(('.yml', '.yaml')):
                    filepath = os.path.join(root, file)
                    try:
                        with open(filepath, 'r') as f:
                            yaml.safe_load(f)
                        print(f'✓ {filepath}')
                    except Exception as e:
                        print(f'✗ {filepath}: {e}')
        "

  # Deployment Readiness Check
  deployment-readiness:
    runs-on: ubuntu-latest
    name: Deployment Readiness
    needs: [code-quality, test, api-tests, security-compliance, docker-build]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check required files
      run: |
        files=(
          "README.md"
          "ARCHITECTURE.md" 
          "CONTRIBUTING.md"
          "SECURITY.md"
          "LICENSE"
          "requirements.txt"
          "Dockerfile"
          "docker-compose.yml"
        )
        
        for file in "${files[@]}"; do
          if [[ -f "$file" ]]; then
            echo "✓ $file exists"
          else
            echo "✗ $file missing"
            exit 1
          fi
        done
    
    - name: Check environment example
      run: |
        if [[ -f ".env.example" ]]; then
          echo "✓ .env.example exists"
        else
          echo "✗ .env.example missing"
        fi
    
    - name: Validate project structure
      run: |
        required_dirs=(
          "src"
          "tests" 
          "docs"
          "config"
        )
        
        for dir in "${required_dirs[@]}"; do
          if [[ -d "$dir" ]]; then
            echo "✓ $dir/ directory exists"
          else
            echo "✗ $dir/ directory missing"
          fi
        done
    
    - name: Check for production readiness
      run: |
        echo "Deployment readiness check completed"
        echo "All required components are present"
        echo "Ready for production deployment 🚀"