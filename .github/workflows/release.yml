name: Release and Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        default: 'v2.1.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Create Release Build
  build-release:
    runs-on: ubuntu-latest
    name: Build Release Artifacts
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Extract version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "release" ]]; then
          VERSION=${{ github.event.release.tag_name }}
        else
          VERSION=${{ github.event.inputs.version }}
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Building version: ${VERSION}"
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools
    
    - name: Create version file
      run: |
        echo "__version__ = '${{ steps.version.outputs.version }}'" > src/__version__.py
        echo "VERSION = '${{ steps.version.outputs.version }}'" >> src/core/config/version.py
    
    - name: Build Python package
      run: |
        python -m build
    
    - name: Create source archive
      run: |
        git archive --format=tar.gz --prefix=pii-deidentification-${{ steps.version.outputs.version }}/ HEAD > pii-deidentification-${{ steps.version.outputs.version }}-src.tar.gz
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: release-artifacts
        path: |
          dist/
          pii-deidentification-${{ steps.version.outputs.version }}-src.tar.gz

  # Build and Push Docker Images
  docker-release:
    runs-on: ubuntu-latest
    name: Build & Push Docker Images
    needs: build-release
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Sign container image
      run: |
        echo "Container image signed and pushed"

  # Security Scan Release
  security-scan-release:
    runs-on: ubuntu-latest
    name: Security Scan Release
    needs: docker-release
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-release.outputs.version }}
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Generate Release Documentation
  release-docs:
    runs-on: ubuntu-latest
    name: Generate Release Documentation
    needs: build-release
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install documentation dependencies
      run: |
        pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin
        pip install -r requirements.txt
    
    - name: Generate API documentation
      run: |
        python -c "
        from src.main import app
        import json
        
        # Generate OpenAPI spec
        with open('docs/api/openapi.json', 'w') as f:
            json.dump(app.openapi(), f, indent=2)
        "
    
    - name: Build documentation
      run: |
        mkdocs build --clean
    
    - name: Upload documentation
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: site/

  # Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    needs: [build-release, docker-release]
    environment: staging
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to staging environment
      run: |
        echo "Deploying version ${{ needs.build-release.outputs.version }} to staging"
        # Add actual deployment commands here
        
        # Example docker-compose deployment
        # docker-compose -f docker-compose.staging.yml pull
        # docker-compose -f docker-compose.staging.yml up -d
    
    - name: Run smoke tests
      run: |
        echo "Running smoke tests against staging"
        # Add smoke test commands here
        curl -f https://staging.example.com/health || exit 1
    
    - name: Notify staging deployment
      run: |
        echo "Staging deployment completed successfully"

  # Integration Tests on Staging
  staging-tests:
    runs-on: ubuntu-latest
    name: Staging Integration Tests
    needs: deploy-staging
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install test dependencies
      run: |
        pip install pytest requests
    
    - name: Run integration tests against staging
      run: |
        export STAGING_URL=https://staging.example.com
        pytest tests/integration/ -v --tb=short -m "staging"
    
    - name: Run performance tests
      run: |
        echo "Running performance tests against staging"
        # Add performance test commands

  # Production Deployment (Manual Approval)
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [build-release, docker-release, staging-tests]
    environment: production
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to production environment
      run: |
        echo "Deploying version ${{ needs.build-release.outputs.version }} to production"
        # Add actual production deployment commands here
        
        # Example production deployment
        # kubectl set image deployment/pii-system app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-release.outputs.version }}
        # kubectl rollout status deployment/pii-system
    
    - name: Run production smoke tests
      run: |
        echo "Running production smoke tests"
        # Add production smoke tests
        curl -f https://api.example.com/health || exit 1
    
    - name: Update deployment status
      run: |
        echo "Production deployment completed successfully"
        echo "Version ${{ needs.build-release.outputs.version }} is now live"

  # Post-Release Tasks
  post-release:
    runs-on: ubuntu-latest
    name: Post-Release Tasks
    needs: [build-release, docker-release, release-docs]
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Update release notes
      if: github.event_name == 'release'
      run: |
        echo "Updating release notes for ${{ needs.build-release.outputs.version }}"
        # Generate changelog
        # Update documentation
    
    - name: Notify team
      run: |
        echo "Release ${{ needs.build-release.outputs.version }} pipeline completed"
        echo "Docker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-release.outputs.version }}"
        
        # Send notifications
        # - Slack notification
        # - Email notification
        # - Update monitoring dashboards
    
    - name: Archive release artifacts
      uses: actions/upload-artifact@v3
      with:
        name: release-${{ needs.build-release.outputs.version }}
        path: |
          dist/
          site/
        retention-days: 90
    
    - name: Cleanup
      run: |
        echo "Cleaning up temporary resources"
        # Cleanup staging resources if needed
        # Update monitoring alerts
        # Archive logs